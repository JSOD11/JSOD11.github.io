<html>
	<head>
		<title>NumGame</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
	</head>
	<body class="is-preload">

		<!-- Wrapper -->
			<div id="wrapper">

				<!-- Header -->
					<header id="header">
						<div class="logo">
							<p id="curr_count">0</p>
						</div>
						<div class="content">
							<div class="inner">
								<p id="target"></p>
								<input type="text" id="input_num" />
							</div>
						</div>
					</header>

				<!-- Footer -->
					<footer id="footer">
					</footer>

			</div>

		<!-- BG -->
			<div id="bg"></div>

		<!-- Scripts -->

			<script src="assets/js/jquery.min.js"></script>
			<script src="assets/js/browser.min.js"></script>
			<script src="assets/js/breakpoints.min.js"></script>
			<script src="assets/js/util.js"></script>
			<script src="assets/js/main.js"></script>

			<script>
				count = 0
				let target = Math.floor(Math.random() * 9)
				document.getElementById("target").innerHTML = target;

				let input = document.getElementById("input_num");
				input.addEventListener("keydown", function(e) {
					console.log(input.value.concat(e.key))
					if (parseInt(input.value.concat(e.key)) === target) {
						count++;
						document.getElementById("curr_count").innerHTML = count;
						target = Math.floor(Math.random() * 9);
						document.getElementById("target").innerHTML = target;
						document.getElementById("input_num").value = "";
					}
				})
			</script>
